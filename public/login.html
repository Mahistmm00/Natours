<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natours | Log In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      :root {
        --green-light: #7dd56f;
        --green-dark: #28b487;
        --green-mid: #55c57a;
        --bg: #f5f7f3;
        --text-dark: #1a2e1f;
        --text-mid: #4a5e4f;
        --text-muted: #8a9e8f;
        --border: #e2ead4;
        --header-bg: #1a2e1f;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 62.5%;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.6rem;
        color: var(--text-dark);
        min-height: 100vh;
        background: var(--bg);
      }

      .header {
        background: var(--header-bg);
        padding: 0 5rem;
        height: 7.2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.25);
      }
      .header__logo img {
        height: 3.2rem;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 2rem;
      }
      .nav__el,
      .nav__el:link,
      .nav__el:visited {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        font-size: 1.4rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: color 0.2s;
        border: none;
        background: none;
        cursor: pointer;
        font-family: inherit;
      }
      .nav__el:hover {
        color: var(--green-light);
      }
      .nav__el--cta {
        background: var(--green-mid);
        color: #fff !important;
        padding: 0.8rem 2rem;
        border-radius: 10rem;
      }

      .main {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 7.2rem);
        padding: 4rem 2rem;
        background: linear-gradient(
          135deg,
          #f0f7ed 0%,
          #e8f5e2 50%,
          #f5f7f3 100%
        );
        position: relative;
      }
      .main::before {
        content: '';
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2355c57a' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }

      .login-container {
        position: relative;
        width: 100%;
        max-width: 50rem;
        background: #fff;
        border-radius: 2.4rem;
        box-shadow: 0 25px 80px rgba(30, 60, 35, 0.14);
        overflow: hidden;
      }
      .login-banner {
        background: linear-gradient(
          135deg,
          var(--green-dark),
          var(--green-light)
        );
        padding: 4rem 4rem 3rem;
        text-align: center;
        position: relative;
      }
      .login-banner::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 3rem;
        background: #fff;
        border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      }
      .login-logo img {
        height: 4rem;
        margin-bottom: 1.5rem;
      }
      .login-banner h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2.8rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.6rem;
      }
      .login-banner p {
        font-size: 1.45rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .login-body {
        padding: 1.5rem 4rem 4rem;
      }

      .form__group {
        margin-bottom: 2.2rem;
      }
      .form__label {
        display: block;
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--text-mid);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.8rem;
      }
      .form__input {
        display: block;
        width: 100%;
        padding: 1.3rem 1.8rem;
        font-family: inherit;
        font-size: 1.55rem;
        color: var(--text-dark);
        background: #f9fbf7;
        border: 1.5px solid var(--border);
        border-radius: 1.2rem;
        outline: none;
        transition: all 0.25s;
      }
      .form__input:focus {
        border-color: var(--green-mid);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(85, 197, 122, 0.12);
      }
      .form__input:focus:invalid {
        border-color: #e74c3c;
        box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
      }
      .form__input::placeholder {
        color: #c0cec5;
      }

      .form__forgot {
        text-align: right;
        margin-top: -1.4rem;
        margin-bottom: 2rem;
      }
      .form__forgot a {
        font-size: 1.3rem;
        color: var(--green-mid);
        text-decoration: none;
      }
      .form__forgot a:hover {
        text-decoration: underline;
      }

      .btn-login {
        display: block;
        width: 100%;
        padding: 1.5rem;
        background: linear-gradient(
          135deg,
          var(--green-mid),
          var(--green-dark)
        );
        color: #fff;
        font-family: inherit;
        font-size: 1.6rem;
        font-weight: 700;
        border: none;
        border-radius: 1.2rem;
        cursor: pointer;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition: all 0.25s;
        box-shadow: 0 6px 20px rgba(40, 180, 135, 0.3);
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(40, 180, 135, 0.4);
      }
      .btn-login:active {
        transform: translateY(0);
      }

      .login-divider {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin: 2.5rem 0;
      }
      .login-divider::before,
      .login-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .login-divider span {
        font-size: 1.3rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .login-footer {
        text-align: center;
        margin-top: 2.5rem;
        font-size: 1.45rem;
        color: var(--text-muted);
      }
      .login-footer a {
        color: var(--green-mid);
        text-decoration: none;
        font-weight: 600;
      }
      .login-footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        .header {
          padding: 0 2rem;
        }
        .nav {
          gap: 1rem;
        }
        .login-banner {
          padding: 3rem 2.5rem 2.5rem;
        }
        .login-banner h1 {
          font-size: 2.2rem;
        }
        .login-body {
          padding: 1.5rem 2.5rem 3.5rem;
        }
      }
      @media (max-width: 400px) {
        .login-banner {
          padding: 2.5rem 2rem 2rem;
        }
        .login-body {
          padding: 1rem 1.8rem 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header__logo">
        <img
          src="img/logo-white.png"
          alt="Natours"
          onerror="
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'block';
          "
        />
        <span
          style="
            display: none;
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
          "
          >NATOURS</span
        >
      </div>
      <nav class="nav">
        <a href="overview.html" class="nav__el">All tours</a>
        <a href="#" class="nav__el nav__el--cta">Sign up</a>
      </nav>
    </header>

    <main class="main">
      <div class="login-container">
        <div class="login-banner">
          <div class="login-logo">
            <img
              src="img/logo-white.png"
              alt="Natours"
              onerror="this.style.display = 'none'"
            />
          </div>
          <h1>Welcome back</h1>
          <p>Log in to continue your adventure</p>
        </div>

        <div class="login-body">
          <form class="form form--login">
            <div class="form__group">
              <label class="form__label" for="email">Email address</label>
              <input
                id="email"
                class="form__input"
                type="email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="form__group">
              <label class="form__label" for="password">Password</label>
              <input
                id="password"
                class="form__input"
                type="password"
                placeholder="••••••••"
                required
                minlength="8"
              />
            </div>
            <div class="form__forgot">
              <a href="#">Forgot password?</a>
            </div>
            <button class="btn-login" type="submit">Log in</button>
          </form>

          <div class="login-footer">
            Don't have an account? <a href="#">Sign up for free</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
